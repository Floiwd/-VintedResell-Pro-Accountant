<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    h2 {
      font-size: 18px;
      margin-top: 0;
      color: #6366f1;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button:hover {
      background: #4f46e5;
    }
    #result {
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      font-size: 10px;
      font-family: monospace;
      max-height: 200px;
      overflow: auto;
      display: none;
    }
    .copy-btn {
      margin-top: 10px;
      background: #334155;
      display: none;
    }
  </style>
</head>
<body>
  <h2>ResellPro Sync</h2>
  <p>Ouvrez votre liste de transactions Vinted puis cliquez sur le bouton ci-dessous.</p>
  
  <button id="scrapeBtn">Extraire les données</button>
  
  <div id="result"></div>
  <button id="copyBtn" class="copy-btn">Copier le résultat</button>

  <script src="popup.js"></script>
</body>
</html>
